<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRA RSU Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <div class="bg-indigo-900 text-white text-[10px] p-1 mb-4 rounded">DEBUG: VERSION 3.0 - FEE COLUMN ACTIVE</div>

        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">RSU Ledger</h1>
            <div class="flex gap-4">
                <button onclick="addRow()" class="bg-slate-800 px-4 py-2 rounded border border-slate-600 font-bold">+ Add Row</button>
                <button onclick="sync()" class="bg-indigo-500 px-6 py-2 rounded font-bold">Calculate</button>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-[10px] uppercase font-black text-slate-500">
                    <tr>
                        <th class="p-4">Date</th>
                        <th class="p-4">Type</th>
                        <th class="p-4">USD Price</th>
                        <th class="p-4">FX</th>
                        <th class="p-4">Shares</th>
                        <th class="p-4 text-orange-400">FEE (USD)</th> <th class="p-4 text-indigo-400">Proceeds (CAD)</th> <th class="p-4 text-emerald-400">Cost (ACB)</th> <th class="p-4">Notes</th> <th class="p-4"></th> </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-700/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        let rows = [];

        function addRow() {
            // Force the fee property to exist immediately
            rows.push({
                id: Date.now(),
                date: '',
                type: 'VEST',
                price: 0,
                shares: 0,
                fee: 0,
                fx: 0,
                proceeds: 0,
                acb: 0,
                notes: ''
            });
            render();
        }

        function updateLocal(id, field, value) {
            const r = rows.find(x => x.id === id);
            if (r) {
                r[field] = ['price', 'shares', 'fee'].includes(field) ? parseFloat(value) || 0 : value;
            }
        }

        async function sync() {
            const res = await fetch('/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            });
            const data = await res.json();
            rows = data.transactions;
            render();
        }

        function render() {
            const body = document.getElementById('table-body');
            body.innerHTML = rows.map(r => `
                <tr class="hover:bg-slate-700/50 border-b border-slate-700">
                    <td class="p-2"><input type="date" value="${r.date}" onchange="updateLocal(${r.id}, 'date', this.value)" class="bg-slate-900 p-1 text-xs rounded border border-slate-700 w-full text-white"></td>
                    <td class="p-2">
                        <select onchange="updateLocal(${r.id}, 'type', this.value)" class="bg-slate-900 p-1 text-xs rounded border border-slate-700 w-full text-white">
                            <option value="VEST" ${r.type==='VEST'?'selected':''}>VEST</option>
                            <option value="SALE" ${r.type==='SALE'?'selected':''}>SALE</option>
                        </select>
                    </td>
                    <td class="p-2"><input type="number" step="0.01" value="${r.price}" oninput="updateLocal(${r.id}, 'price', this.value)" class="bg-transparent border-b border-slate-600 text-xs w-full p-1 text-white"></td>
                    <td class="p-4 text-xs font-mono text-slate-500">${r.fx ? r.fx.toFixed(4) : '--'}</td>
                    <td class="p-2"><input type="number" value="${r.shares}" oninput="updateLocal(${r.id}, 'shares', this.value)" class="bg-transparent border-b border-slate-600 text-xs w-full p-1 text-white"></td>

                    <td class="p-2">
                        <input type="number" step="0.01" value="${r.fee}" oninput="updateLocal(${r.id}, 'fee', this.value)"
                        class="bg-slate-900/50 border-b border-orange-500 text-orange-400 text-xs w-full p-1" placeholder="0.00">
                    </td>

                    <td class="p-4 text-xs font-bold text-indigo-300">$${(r.proceeds || 0).toFixed(2)}</td>
                    <td class="p-4 text-xs font-bold text-emerald-400">$${(r.acb || 0).toFixed(2)}</td>
                    <td class="p-4 text-[9px] text-slate-500 italic">${r.notes || '-'}</td>
                    <td class="p-4 text-right"><button onclick="this.closest('tr').remove()" class="text-rose-500">✕</button></td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
