<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRA RSU Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fee-input { color: #fb923c !important; border-bottom: 1px solid #7c2d12 !important; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic">RSU TRACKER <span class="text-indigo-500">v5.0</span></h1>
            <div class="flex gap-4">
                <button onclick="addRow()" class="bg-slate-800 border border-slate-700 px-6 py-2 rounded-xl font-bold text-sm text-white hover:bg-slate-700 transition">+ Add Row</button>
                <button onclick="sync()" class="bg-indigo-600 px-8 py-2 rounded-xl font-bold text-sm text-white shadow-lg shadow-indigo-500/20 hover:bg-indigo-500 transition">Calculate CAD</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h3 class="text-[10px] uppercase font-black text-slate-500 mb-2">Pool Shares</h3>
                <span id="p-shares" class="text-3xl font-bold text-indigo-400">0</span>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <h3 class="text-[10px] uppercase font-black text-slate-500 mb-2">Tank Shares</h3>
                <span id="t-shares" class="text-3xl font-bold text-amber-400">0</span>
            </div>
            <div class="bg-indigo-600 p-6 rounded-2xl shadow-xl">
                <h3 class="text-[10px] uppercase font-black text-indigo-100 mb-2">Total Shares</h3>
                <span id="tot-shares" class="text-3xl font-bold text-white">0</span>
            </div>
        </div>

        <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-[10px] uppercase font-black text-slate-500 border-b border-slate-700">
                    <tr>
                        <th class="p-4">Date</th>
                        <th class="p-4">Type</th>
                        <th class="p-4">Price (USD)</th>
                        <th class="p-4 text-slate-400">FX</th>
                        <th class="p-4">Shares</th>
                        <th class="p-4 text-orange-400">Fee (USD)</th>
                        <th class="p-4 text-indigo-400">Net Proceeds (CAD)</th>
                        <th class="p-4 text-emerald-400">ACB (CAD)</th>
                        <th class="p-4 text-rose-400">Gain (CAD)</th>
                        <th class="p-4">Notes</th>
                        <th class="p-4"></th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-700/50"></tbody>
            </table>
            <div id="empty" class="p-20 text-center text-slate-600 italic">Click "+ Add Row" to begin.</div>
        </div>
    </div>

    <script>
        let rows = [];

        function addRow() {
            document.getElementById('empty').style.display = 'none';
            rows.push({ id: Date.now(), date: '', type: 'VEST', price: 0, shares: 0, fee: 0, fx: 0, proceeds: 0, acb: 0, gain: 0, notes: '' });
            render();
        }

        function updateLocal(id, field, value) {
            const r = rows.find(x => x.id === id);
            if (r) {
                if (['price', 'shares', 'fee'].includes(field)) {
                    r[field] = parseFloat(value) || 0;
                } else {
                    r[field] = value;
                }
            }
        }

        async function sync() {
            const res = await fetch('/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            });
            const data = await res.json();
            rows = data.transactions;

            document.getElementById('p-shares').innerText = data.summary.pool_shares;
            document.getElementById('t-shares').innerText = data.summary.tank_shares;
            document.getElementById('tot-shares').innerText = data.summary.total_shares;
            render();
        }

        function removeRow(id) {
            rows = rows.filter(r => r.id !== id);
            if (!rows.length) document.getElementById('empty').style.display = 'block';
            render();
        }

        function render() {
            const body = document.getElementById('table-body');
            body.innerHTML = rows.map(r => `
                <tr class="hover:bg-slate-700/30 group">
                    <td class="p-2">
                        <input type="date" value="${r.date}" onchange="updateLocal(${r.id}, 'date', this.value)"
                        class="bg-slate-900 border border-slate-700 rounded p-1 text-xs w-full text-white">
                    </td>
                    <td class="p-2">
                        <select onchange="updateLocal(${r.id}, 'type', this.value)"
                        class="bg-slate-900 text-[10px] font-bold p-1 rounded border border-slate-700 w-full text-white uppercase">
                            <option value="VEST" ${r.type==='VEST'?'selected':''}>VEST</option>
                            <option value="SALE" ${r.type==='SALE'?'selected':''}>SALE</option>
                            <option value="AUTO_SALE" ${r.type==='AUTO_SALE'?'selected':''}>AUTO_SALE</option>
                        </select>
                    </td>
                    <td class="p-2">
                        <input type="number" step="0.0001" value="${r.price}" oninput="updateLocal(${r.id}, 'price', this.value)"
                        class="bg-transparent border-b border-slate-700 text-xs w-full p-1 text-white">
                    </td>
                    <td class="p-4 font-mono text-[10px] text-slate-500">
                        ${r.fx ? r.fx.toFixed(4) : '---'}
                    </td>
                    <td class="p-2">
                        <input type="number" value="${r.shares}" oninput="updateLocal(${r.id}, 'shares', this.value)"
                        class="bg-transparent border-b border-slate-700 text-xs w-full p-1 text-white">
                    </td>
                    <td class="p-2">
                        <input type="number" step="0.01" value="${r.fee}" oninput="updateLocal(${r.id}, 'fee', this.value)"
                        class="bg-transparent text-xs w-full p-1 fee-input outline-none" placeholder="0.00">
                    </td>
                    <td class="p-4 text-xs font-bold text-indigo-300">
                        $${(r.proceeds || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="p-4 text-xs font-bold text-emerald-400">
                        $${(r.acb || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="p-4 text-xs font-bold text-rose-400">
                        $${(r.gain || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="p-4 text-[9px] text-slate-500 italic leading-tight">
                        ${r.notes || '-'}
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="removeRow(${r.id})" class="text-rose-500 opacity-0 group-hover:opacity-100 transition">✕</button>
                    </td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
